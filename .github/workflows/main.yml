name: Daily Timestamp Update

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-timestamp:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update timestamp in LICENSE
        run: |
          TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M:%S UTC")
          sed -i "s/Last updated: .*/Last updated: $TIMESTAMP/" LICENSE

      - name: Commit and push
        run: |
          git config user.name "Mustafa Z"          # your GitHub name
          git config user.email "your@email.com"      # your GitHub email
          git add LICENSE
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "chore: update timestamp [daily bot]"
          git push
